<!doctype html>
<html lang="en">
<head>
    <?php include __DIR__ . '/partials/head.html'; ?>
    <link rel="stylesheet" href="public/styles/partials/sidebar.css" />
    <link rel="stylesheet" href="public/styles/matches.css" />
</head>
<body>
<div class="dashboard-layout">

    <?php include __DIR__ . '/partials/sidebar.html'; ?>

    <main class="dashboard-main">
        <div class="matches-wrap">

            <h1 class="matches-title">Your Matches</h1>
            <p class="matches-subtitle">People who share your rhythm.</p>

            <?php if (empty($matches)): ?>
            <div class="matches-empty">
                <div class="empty-logo">
                    <img src="public/assets/img/logo.svg" alt="HeartBeat" />
                </div>
                <h2>It's a Match!</h2>
                <p>...soon. Keep swiping to find your sync.</p>
                <a href="/discover" class="btn-discover">Discover People</a>
            </div>
            <?php else: ?>

            <div class="matches-list">
                <?php foreach ($matches as $match): ?>
                <?php
                    $partnerId = (int) $match['partner_id'];
                    $partnerName = htmlspecialchars($match['partner_name'] ?? 'Unknown', ENT_QUOTES, 'UTF-8');
                    $partnerCity = htmlspecialchars($match['partner_city'] ?? 'Unknown city', ENT_QUOTES, 'UTF-8');
                    $partnerAge = !empty($match['partner_age']) ? ', ' . (int) $match['partner_age'] : '';
                    $matchedAt = !empty($match['matched_at']) ? date('M j, Y', strtotime($match['matched_at'])) : '';
                    $bio = htmlspecialchars($match['partner_bio'] ?? 'No bio yet.', ENT_QUOTES, 'UTF-8');
                    $genres = $match['music']['top_genres'] ?? [];
                    $artists = $match['music']['top_artists'] ?? [];
                    $initials = strtoupper(substr(preg_replace('/[^a-z]/i', '', $match['partner_name'] ?? 'HB'), 0, 2));
                ?>
                <div class="match-card">
                    <div class="match-top">
                        <div class="match-avatar"><?= htmlspecialchars($initials ?: 'HB', ENT_QUOTES, 'UTF-8') ?></div>
                        <div class="match-info">
                            <a href="/matches/<?= $partnerId ?>" class="match-name"><?= $partnerName ?><?= $partnerAge ?></a>
                            <p class="match-city">
                                <span class="material-symbols-outlined">location_on</span>
                                <?= $partnerCity ?>
                            </p>
                            <p class="match-date">Matched <?= htmlspecialchars($matchedAt, ENT_QUOTES, 'UTF-8') ?></p>
                        </div>
                        <div class="match-artists">
                            <div class="artist-stack">
                                <?php foreach (array_slice($artists, 0, 3) as $index => $artist): ?>
                                <div class="artist-stack-item" style="z-index: <?= 3 + $index ?>;">
                                    <?php if (!empty($artist['artist_image_url'])): ?>
                                        <img src="<?= htmlspecialchars($artist['artist_image_url'], ENT_QUOTES, 'UTF-8') ?>" alt="<?= htmlspecialchars($artist['artist_name'] ?? '', ENT_QUOTES, 'UTF-8') ?>" />
                                    <?php else: ?>
                                        <span class="material-symbols-outlined">person</span>
                                    <?php endif; ?>
                                </div>
                                <?php endforeach; ?>
                            </div>
                        </div>
                    </div>
                    <div class="match-socials">
                        <?php if (!empty($match['spotify_handle'])): ?>
                        <a href="https://open.spotify.com/user/<?= rawurlencode($match['spotify_handle']) ?>" target="_blank" class="social-tag social-spotify">
                            <span class="material-symbols-outlined">graphic_eq</span>
                            <?= htmlspecialchars($match['spotify_handle'], ENT_QUOTES, 'UTF-8') ?>
                        </a>
                        <?php endif; ?>
                        <?php if (!empty($match['instagram_handle'])): ?>
                        <a href="https://instagram.com/<?= rawurlencode(ltrim($match['instagram_handle'], '@')) ?>" target="_blank" class="social-tag social-instagram">
                            <span class="material-symbols-outlined">alternate_email</span>
                            <?= htmlspecialchars(ltrim($match['instagram_handle'], '@'), ENT_QUOTES, 'UTF-8') ?>
                        </a>
                        <?php endif; ?>
                    </div>
                    <div class="match-genres">
                        <?php foreach ($genres as $genre): ?>
                            <span class="genre-tag"><?= htmlspecialchars($genre, ENT_QUOTES, 'UTF-8') ?></span>
                        <?php endforeach; ?>
                        <?php if (empty($genres)): ?>
                            <span class="genre-tag">No music data</span>
                        <?php endif; ?>
                    </div>
                    <p class="match-bio"><?= $bio ?></p>
                    <div class="match-footer">
                        <a href="/matches/<?= $partnerId ?>" class="match-profile-link">
                            <span class="material-symbols-outlined">person_search</span>
                            View profile
                        </a>
                    </div>
                </div>
                <?php endforeach; ?>
            </div>
            <?php endif; ?>
        </div>
    </main>
</div>
</body>
</html>
